    # confinement (proven fail-closed in the dedicated sandbox lane), and bwrap on a plain runner is flaky. So force the
    # unconfined path deterministically + disable the prlimit caps (the RLIMIT_NPROC per-UID trap that signal-kills forks
    # on a shared host). The agents here author a trivial marker reply in a throwaway git workspace; real confinement
