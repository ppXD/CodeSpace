        #     skills auto-discovery + the model's auto-invocation) is REPORTED, not gated — its LOADING is gated
        #     deterministically by RealHarnessSkillProjectionTests (no live model needed).
        #   ~RealModelCodexInjection → the CODEX behavioral proof (persona via $CODEX_HOME/AGENTS.md; skill via
        #     $CODEX_HOME/skills). INFORMATIONAL wire (OpenAI `responses`) → one reported attempt; a run that can't
        #     complete on the shared gateway is non-gating LOUD infra, never a false red.
        #   ~RealCodexResume → the DETERMINISTIC real-codex-binary proofs (thread resume + persona rollout), dummy key,
