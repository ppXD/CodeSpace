          --no-restore
          --filter "FullyQualifiedName~RealModelAgentInjection|FullyQualifiedName~RealModelCodexInjection|FullyQualifiedName~RealCodexResume"
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=real-model-injection.trx"
          --results-directory backend/TestResults

      - name: Assert the injection gates actually ran (no silent skip)
        # `dotnet test --filter` exits 0 on zero matches, so an FQN/trait drift that de-selects the injection gates must
        # RED this lane, not pass green at zero cost. (A secrets-absent run still SELECTS + reports these classes, so the
        # count is >=1 whether or not the gateway is set.)
        run: |
          trx=backend/TestResults/real-model-injection.trx
          test -f "$trx" || { echo "::error::trx not found at $trx — the test step produced no results"; exit 1; }
          executed=$(grep -oE 'executed="[0-9]+"' "$trx" | head -1 | grep -oE '[0-9]+')
          echo "executed=${executed:-0}"
          if [ "${executed:-0}" -lt 1 ]; then
            echo "::error::Expected the RealModel injection gates to run, but ${executed:-0} executed — the filter matched nothing (FQN/trait regression?)."
            exit 1
