name: Backend · Real model

# Drives the REAL supervisor decider against a real endpoint (the CODESPACE_LLM_* repository secrets) and scores
# its decisions over the golden scenarios — the measure-the-intelligence kill-gate. Each run calls the LIVE API,
# so it runs on main + on demand (NOT on every PR push) to control token cost. The Category=RealModel tests
# self-skip when the secrets are absent, so a fork without them stays green at zero API cost.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/real-model.yml'
  workflow_dispatch:

concurrency:
  group: real-model-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  real-model:
    name: real model (supervisor decision eval)
    runs-on: ubuntu-latest
    # Headroom for the SEQUENTIAL worst case (xUnit runs a class's [Theory] cases serially): the trajectory class is
    # 10 cases (5 scenarios — happy/conflict/failure/persistent-conflict/multi-failure × 2 wires) each bounded by its
    # own 6-min wall-clock deadline, plus the decision class (14 golden × 2 wires = 28 calls, each bounded by its 150s
    # per-call HTTP timeout) + the arbiter. The trajectory/arbiter BLESSED (Anthropic) cases now carry a best-of-N=2
    # capability-floor, so a case that FAILS re-runs up to N times (only a *failing* case re-runs — a healthy model passes
    # attempt 1 at single-attempt cost, OpenAI runs once), worst case ~doubling the blessed trajectory budget. Typical is
    # FAR lower (a decision ~15-90s, a converging trajectory ~3-5 min). A per-call timeout / unreachable gateway is
    # NON-GATING infra (surfaced to the job summary, not a RED) and does not consume a best-of-N slot, so a slow tail
    # can't flake the blessed kill-gate — only a model that fails ALL N attempts (a genuine miss) reds it.
    timeout-minutes: 120
    env:
      # The custom-endpoint config the RealModel tests read (a [Theory] over both Anthropic + OpenAI wires from
      # one gateway). Absent on a fork → the tests self-skip → green at zero cost.
      CODESPACE_LLM_BASE_URL: ${{ secrets.CODESPACE_LLM_BASE_URL }}
      CODESPACE_LLM_API_KEY: ${{ secrets.CODESPACE_LLM_API_KEY }}
      CODESPACE_LLM_MODEL_ID: ${{ secrets.CODESPACE_LLM_MODEL_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-realmodel-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-realmodel-${{ runner.os }}-

      - name: Restore
        run: dotnet restore backend/tests/CodeSpace.IntegrationTests/CodeSpace.IntegrationTests.csproj

      - name: Test (the supervisor + session decision evals — drives the live endpoint, scores the golden decisions)
        # The component RealModel evals in IntegrationTests (no Postgres — each builds its LLM client in-memory):
        #   ~RealModelSupervisor → the single-decision kill-gate + the multi-turn trajectory gate + the arbiter
        #     (RealModelSupervisorDecisionFlowTests / RealModelSupervisorTrajectoryFlowTests / RealModelSupervisorArbiterFlowTests).
        #   ~RealModelSession → the session-handoff evals (RealModelSessionContinueFlowTests / RealModelSessionSummaryFlowTests).
        #     These carry Category=RealModel but their class token is "RealModelSession", NOT "RealModelSupervisor", so the
        #     old single-clause filter silently de-selected them — they ran on NO lane. The OR-clause re-includes them; both
        #     are DB-free component evals, so the no-Postgres job is the correct home.
        # The DB-backed whole-loop gates live in the E2ETests assembly and run in their own Postgres job below. The planner
        # RealModel test is a separate, DB-backed concern with its own ANTHROPIC-native key, so it is not run here.
        #
        # Per-wire gate policy lives in RealModelGate: the blessed wire (Anthropic by default) GATES this job; other
        # wires (OpenAI) run + report their verdict to the log but do NOT fail the job — an operator reblesses via the
        # CODESPACE_REALMODEL_REQUIRED_PROVIDERS env var (comma-separated) without a code change.
        run: >
          dotnet test backend/tests/CodeSpace.IntegrationTests/CodeSpace.IntegrationTests.csproj
          --no-restore
          --filter "FullyQualifiedName~RealModelSupervisor|FullyQualifiedName~RealModelSession"
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=real-model.trx"
          --results-directory backend/TestResults

      - name: Assert the decision evals actually ran (no silent skip)
        # `dotnet test --filter` EXITS 0 even when the filter matches ZERO tests, so an FQN/trait regression could green
        # this gate while exercising nothing — exactly how the session evals went unnoticed on no lane. Require >=1 selected.
        # (A secrets-absent run still SELECTS + reports these classes, so the count is >=1 whether or not the gateway is set.)
        run: |
          trx=backend/TestResults/real-model.trx
          test -f "$trx" || { echo "::error::trx not found at $trx — the test step produced no results"; exit 1; }
          executed=$(grep -oE 'executed="[0-9]+"' "$trx" | head -1 | grep -oE '[0-9]+')
          echo "executed=${executed:-0}"
          if [ "${executed:-0}" -lt 1 ]; then
            echo "::error::Expected RealModel decision evals to run, but ${executed:-0} executed — the filter matched nothing (FQN/trait regression?)."
            exit 1
          fi

  real-model-wholeloop:
    name: real model (live-brain whole-loop)
    runs-on: ubuntu-latest
    # The live brain authors up to maxRounds (12 — a FAIR budget for a real, less-efficient model to reach the accept
    # head) decisions, each a live API call (~15-60s), plus real git clone/capture/integrate per spawned agent + the
    # acceptance grade; the headline arc may re-run up to best-of-N (3, set below) independent times when the model parks
    # short. The 60-min ceiling holds the worst case (≈3 attempts × ~12 rounds + the 2 reaction arcs) with headroom for a
    # slow tail's scored verdict rather than an opaque kill.
    timeout-minutes: 60

    # A plain host runner (NOT a privileged bwrap container). This lane's gate is the LIVE BRAIN driving the real
    # durable loop — NOT sandbox confinement (which is proven, fail-closed, in the dedicated sandbox lane). The spawned
    # agent here is a TRUSTED test fake (FileWritingFakeCli), so it needs no confinement; and bwrap on a plain runner is
    # FLAKY (its trivial probe can pass while the real agent's bind-mounted git/file IO fails under the same userns on
    # some runner instances — observed red-ing the brain gate on an execution fault, never a brain miss). So we force the
    # already-supported UNCONFINED path deterministically (CODESPACE_BWRAP_PATH below → probe unavailable → unconfined;
    # REQUIRE_SANDBOX is unset, so no fail-closed throw). git is pre-installed on ubuntu-latest (the test self-skips if not).
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: '123456'
          POSTGRES_DB: postgres
        # Host-port mapped (NOT a container-alias) — this job runs directly on the runner, so the E2ETests fixture
        # reaches Postgres at localhost:5432 (its appsettings default), exactly like the e2e-http job.
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      # The custom-endpoint config the RealModel tests read; absent on a fork → the test self-skips → green at zero cost.
      CODESPACE_LLM_BASE_URL: ${{ secrets.CODESPACE_LLM_BASE_URL }}
      CODESPACE_LLM_API_KEY: ${{ secrets.CODESPACE_LLM_API_KEY }}
      CODESPACE_LLM_MODEL_ID: ${{ secrets.CODESPACE_LLM_MODEL_ID }}
      # best-of-N capability-floor for the strict whole-loop gate (Rule 8 escape hatch): 3 independent attempts absorb a
      # real model's run-to-run variance so a single off-run can't flaky-red main, while a persistent park-short still REDs.
      CODESPACE_REALMODEL_WHOLE_LOOP_ATTEMPTS: '3'
      # Force the fake agent UNCONFINED on this brain-gate lane: a non-existent bwrap binary makes BubblewrapSandbox's
      # probe degrade to "unavailable" → the agent runs unconfined (deterministic), bypassing plain-host bwrap flakiness.
      # Safe: REQUIRE_SANDBOX is unset (no fail-closed throw), the agent is a trusted test fake, and confinement is gated
      # for real in the sandbox lane. A best-of-N attempt's agent failure here was an EXECUTION fault, not a brain miss.
      CODESPACE_BWRAP_PATH: /nonexistent/bwrap-disabled-on-the-brain-gate-lane
      # ALSO disable the prlimit resource caps (caps=0 → ProcessRlimits.Wrap returns the command UNCHANGED → no prlimit
      # wrapper). Disabling bwrap left prlimit ARMED, and RLIMIT_NPROC is a PER-UID cap: on a plain unprivileged shared
      # ubuntu-latest host it counts the runner's WHOLE process table, so a heavier runner-image baseline can push the
      # wrapped fake's fork()s over the cap → the kernel SIGNAL-KILLS it → the durable spool's $? marker records
      # 128+signal → AgentRun Status=Failed → realPatches=0 (the false-red observed from ~02:00 UTC 2026-06-24). The
      # green prlimit lanes run as ROOT in --privileged containers, where NPROC headroom is unlimited + the process
      # table is near-empty, so the cap never bites. The agent here is a trusted fake that needs no fork-bomb/file-size
      # cap; real resource confinement stays gated, fail-closed, in the dedicated sandbox-isolation lane.
      CODESPACE_AGENT_MAX_PROCESSES: '0'
      CODESPACE_AGENT_MAX_FILE_MB: '0'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node (for the real coding-agent CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install the real coding-agent CLI (Claude Code)
        # Installs the REAL Claude Code CLI so the live CODING-AGENT arm (the_real_coding_agent_solves_a_goal_relevance_task)
        # can drive a live model to author a real solution.sh + have the goal-relevance oracle grade whether it SOLVED the
        # task. ClaudeCodeHarness resolves `claude` on PATH + projects the seeded gateway credential onto its env
        # (ANTHROPIC_BASE_URL / ANTHROPIC_AUTH_TOKEN), so no extra wiring is needed. The CLI surface is verified against
        # v2.1.x — pin to that line so a future CLI flag change can't silently break the harness.
        #
        # FATAL install (was continue-on-error during the report-only rollout): the_real_coding_agent_solves arm is now a
        # GATING best-of-N solve-rate gate, so a missing `claude` binary must RED the lane, never let the gating arm self-skip
        # green ("skip ≠ pass" would silently pass the acceptance-gate pillar). The v2.1.x pin is confirmed-installable by the
        # prior report-only runs; a future pinned-version miss is a real lane break to fix, not a silent skip.
        run: |
          npm install -g '@anthropic-ai/claude-code@~2.1.0'
          claude --version

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-realmodel-e2e-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-realmodel-e2e-${{ runner.os }}-

      - name: Restore
        run: dotnet restore backend/tests/CodeSpace.E2ETests/CodeSpace.E2ETests.csproj

      - name: Test (the live-brain whole-loop — a REAL model drives the real durable engine end to end)
        # Scoped to the DB-backed whole-loop RealModel classes in E2ETests:
        #   ~RealModelSupervisorWholeLoop → the supervisor drive→accept kill-gate (+ its two reaction arcs).
        #   ~RealModelSession → the session whole-loop gates (RealModelSessionWholeLoopE2ETests + the session convergence
        #     whole-loop). Same de-selection bug as the component job: their class token is "RealModelSession", so the old
        #     single-clause filter ran them on NO lane. Both are [Surface=Engine] DB+git whole-loop tests, so this Postgres
        #     job (which also installs the real coding CLI) is the correct home.
        #   ~RealModelPlanner → the live-model PLANNER gate (RealModelPlannerWholeLoopE2ETests): a real model authors the
        #     plan-map-synth decomposition (pool-driven against the gateway) and the real engine fans out over it. Closes
        #     the orphaned planner-authorship gap (the native-key RealModelPhaseAuthorshipFlowTests ran on no lane).
        # GATING on the real-model-DROVE-to-completion criterion: the HEADLINE drive→accept arc HARD-fails main unless the
        # live model drove the whole arc to the real integrated+accepted head (Drove). A CAPABILITY MISS (the model RAN but
        # parked short) now REDs — made flake-safe by a bounded best-of-N capability-floor (a fresh run per attempt; gates
        # only if EVERY non-infra attempt parks short). A CODE FAULT reds at once; a gateway timeout is non-gating LOUD infra.
        # The reaction arcs (conflict→resolve, failure→retry) still gate only on a CODE FAULT and REPORT a capability miss.
        # Each test self-skips when ALL CODESPACE_LLM_* secrets are absent — surfaced LOUDLY as NOT EVALUATED (skip ≠ pass),
        # fork stays green — and FAILS on a partial config.
        run: >
          dotnet test backend/tests/CodeSpace.E2ETests/CodeSpace.E2ETests.csproj
          --no-restore
          --filter "FullyQualifiedName~RealModelSupervisorWholeLoop|FullyQualifiedName~RealModelSession|FullyQualifiedName~RealModelPlanner"
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=real-model-wholeloop.trx"
          --results-directory backend/TestResults

      - name: Assert the whole-loop gates actually ran (no silent skip)
        # Same fail-closed guard as the component job: `dotnet test --filter` exits 0 on zero matches, so an FQN/trait
        # drift that de-selects the supervisor OR session whole-loop must RED this lane, not pass green at zero cost.
        run: |
          trx=backend/TestResults/real-model-wholeloop.trx
          test -f "$trx" || { echo "::error::trx not found at $trx — the test step produced no results"; exit 1; }
          executed=$(grep -oE 'executed="[0-9]+"' "$trx" | head -1 | grep -oE '[0-9]+')
          echo "executed=${executed:-0}"
          if [ "${executed:-0}" -lt 1 ]; then
            echo "::error::Expected RealModel whole-loop gates to run, but ${executed:-0} executed — the filter matched nothing (FQN/trait regression?)."
            exit 1
          fi

  real-model-benchmark:
    name: real model (benchmark corpus solve-rate)
    runs-on: ubuntu-latest
    # A SEPARATE job from the whole-loop gate (NOT a shared FQN filter): a real claude coding agent attempts the WHOLE
    # seed corpus — every (task × mode) is its own live agent.code run — so this lane's wall-clock is isolated from the
    # whole-loop's own near-60-min best-of-N budget; one slow benchmark run can never time-out the brain gate, and the
    # solve-rate gets its own job summary. The seed corpus is a handful of trivial offline fixtures, so the real agent
    # solves each fast (~30-90s); the ceiling holds the worst case with headroom.
    timeout-minutes: 60

    # Same UNCONFINED rationale as the whole-loop lane: this gate's signal is the live SOLVE-RATE, not sandbox
    # confinement (proven, fail-closed, in the dedicated sandbox lane). The benchmark agent edits TRUSTED offline
    # fixtures, so it needs no confinement; and bwrap on a plain runner is flaky. So force the unconfined path
    # deterministically + disable the prlimit caps (the RLIMIT_NPROC per-UID trap that signal-kills forks on a shared
    # host) — exactly as the whole-loop lane documents.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: '123456'
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      # The custom-endpoint config the RealModel tests read; absent on a fork → the test self-skips → green at zero cost.
      CODESPACE_LLM_BASE_URL: ${{ secrets.CODESPACE_LLM_BASE_URL }}
      CODESPACE_LLM_API_KEY: ${{ secrets.CODESPACE_LLM_API_KEY }}
      CODESPACE_LLM_MODEL_ID: ${{ secrets.CODESPACE_LLM_MODEL_ID }}
      # Force the real agent UNCONFINED (a non-existent bwrap binary → BubblewrapSandbox probe degrades to "unavailable"),
      # and disable the prlimit caps (caps=0 → ProcessRlimits.Wrap returns the command unchanged → no RLIMIT_NPROC kill on
      # a shared host). Safe: REQUIRE_SANDBOX is unset, the benchmark edits trusted offline fixtures, and real confinement
      # stays gated, fail-closed, in the dedicated sandbox-isolation lane.
      CODESPACE_BWRAP_PATH: /nonexistent/bwrap-disabled-on-the-benchmark-lane
      CODESPACE_AGENT_MAX_PROCESSES: '0'
      CODESPACE_AGENT_MAX_FILE_MB: '0'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node (for the real coding-agent CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install the real coding-agent CLI (Claude Code)
        # The benchmark drives the real `claude` CLI per corpus pair (the ClaudeCodeHarness resolves it on PATH + projects
        # the seeded gateway credential). Best-effort install (continue-on-error): a pinned-version miss shows red on the
        # step but the JOB stays green and the benchmark self-skips LOUDLY ("claude not installed → skip ≠ pass") rather
        # than red-ing the lane. Pinned to the v2.1.x line the harness surface is verified against.
        continue-on-error: true
        run: |
          npm install -g '@anthropic-ai/claude-code@~2.1.0'
          claude --version

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-realmodel-e2e-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-realmodel-e2e-${{ runner.os }}-

      - name: Restore
        run: dotnet restore backend/tests/CodeSpace.E2ETests/CodeSpace.E2ETests.csproj

      - name: Test (the live solve-rate — a real claude agent attempts the whole seed corpus)
        # REPORT-ONLY: a brand-new live coding-over-corpus path REPORTS the solve-rate to the job summary (Drove = solved
        # ≥1 task; CapabilityMiss = ran but solved none) and only a CODE FAULT reds; a gateway outage (every pair fails to
        # execute) is non-gating LOUD infra. Self-skips when ALL CODESPACE_LLM_* are absent (fork stays green) and FAILS on
        # a partial config. Flip to a gating solve-rate FLOOR once a first live run confirms the wiring AND a solve.
        run: >
          dotnet test backend/tests/CodeSpace.E2ETests/CodeSpace.E2ETests.csproj
          --no-restore
          --filter "FullyQualifiedName~RealModelBenchmark"
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=real-model-benchmark.trx"
          --results-directory backend/TestResults

      - name: Assert the benchmark gate actually ran (no silent skip)
        # `dotnet test --filter` exits 0 on zero matches, so an FQN/trait drift that de-selects the benchmark must RED this
        # lane, not pass green at zero cost. (A secrets-absent run still SELECTS + reports the class, so the count is >=1.)
        run: |
          trx=backend/TestResults/real-model-benchmark.trx
          test -f "$trx" || { echo "::error::trx not found at $trx — the test step produced no results"; exit 1; }
          executed=$(grep -oE 'executed="[0-9]+"' "$trx" | head -1 | grep -oE '[0-9]+')
          echo "executed=${executed:-0}"
          if [ "${executed:-0}" -lt 1 ]; then
            echo "::error::Expected the RealModel benchmark gate to run, but ${executed:-0} executed — the filter matched nothing (FQN/trait regression?)."
            exit 1
          fi
