name: Backend · E2E

# Two E2E gates, both against a throw-away GUID Postgres:
#
#   1. e2e-http — the REAL ASP.NET pipeline (routing, [AllowAnonymous], model binding, the
#      GlobalExceptionFilter) in-memory via WebApplicationFactory: the actual HTTP status code a
#      webhook provider receives (CodeSpace.E2ETests). Runs directly on the host runner, so it reaches
#      Postgres at localhost:5432 (the committed appsettings.json admin connection).
#
#   2. e2e-engine — THE headline intelligent flow driven top-to-bottom as one engine run:
#      trigger.manual → llm.complete(responseSchema) planner → flow.map fan-out whose body is a REAL
#      agent.code that ACTUALLY EXECUTES (real AgentRunExecutor → real LocalProcessRunner → a fake
#      codex CLI process under REAL bubblewrap confinement → real completion → resume) → a synthesizer
#      that reduces the per-branch results. The Category=E2E tests live in CodeSpace.IntegrationTests
#      (they need the full engine/sandbox DI container, not the HTTP host). bubblewrap is installed +
#      CODESPACE_REQUIRE_SANDBOX=1 so the agent runs CONFINED (the production posture) and a degraded
#      sandbox fails HARD rather than silently running unconfined. It runs in a PRIVILEGED container
#      (mirroring sandbox-isolation.yml) so unprivileged user namespaces work despite ubuntu-latest's
#      AppArmor restriction — and so reaches Postgres by the service ALIAS (postgres:5432), overridden
#      via the TestPostgres__AdminConnectionString env var.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-e2e.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-e2e.yml'
  workflow_dispatch:

concurrency:
  group: backend-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  e2e-http:
    name: dotnet test (E2ETests · HTTP · Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: '123456'
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-e2e-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-e2e-${{ runner.os }}-

      - name: Restore
        run: dotnet restore backend/tests/CodeSpace.E2ETests/CodeSpace.E2ETests.csproj

      - name: Test
        run: >
          dotnet test backend/tests/CodeSpace.E2ETests/CodeSpace.E2ETests.csproj
          --no-restore
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=e2e-http.trx"
          --results-directory backend/TestResults
          --blame-hang-timeout 5m

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-http-trx
          path: backend/TestResults/*.trx
          if-no-files-found: ignore

  e2e-engine:
    name: headline flow (planner → map → real agents → synthesizer)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Runs in a PRIVILEGED container so unprivileged user namespaces work regardless of the host runner's
    # AppArmor policy — current ubuntu-latest (Ubuntu 24.04) ships kernel.apparmor_restrict_unprivileged_userns=1,
    # which denies unprivileged userns for an apt-installed bwrap. The bwrap-confined agent in this E2E needs
    # working userns, so we mirror the already-green sibling sandbox-isolation.yml (`docker run --privileged
    # dotnet/sdk:10.0 + apt install bubblewrap`) — the exact environment these tests were validated against.
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
      options: --privileged

    env:
      # Fail-closed: the headline E2E runs a REAL agent.code branch through the real LocalProcessRunner,
      # which confines it under bubblewrap. With REQUIRE_SANDBOX=1 a host that can't sandbox (no bwrap /
      # no unprivileged userns) makes the run fail HARD instead of silently executing the agent unconfined
      # — so green here means the agent really ran AND was really confined.
      CODESPACE_REQUIRE_SANDBOX: '1'
      # Inside a job container the Postgres SERVICE container is reachable by its network ALIAS (`postgres`),
      # NOT via the host port mapping (`localhost:5432` is the job container itself). Override the test
      # admin connection string (TestPostgres:AdminConnectionString → env double-underscore form) to target
      # the service alias. The e2e-http job stays on `localhost` because it runs directly on the host runner.
      TestPostgres__AdminConnectionString: 'Host=postgres;Port=5432;Username=postgres;Password=123456;Database=postgres'

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: '123456'
          POSTGRES_DB: postgres
        # No `ports:` mapping — inside a container job the service is reached by its alias on the Docker
        # network, so the host-port publish is unnecessary.
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Install bubblewrap + util-linux (prlimit)
        # The headline E2E spawns a REAL agent process through the production runner, which wraps it in
        # bubblewrap + prlimit (the production confinement posture). Running as root in the SDK container, so
        # no sudo. ca-certificates so the container can fetch packages; util-linux for prlimit.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends bubblewrap util-linux ca-certificates
          echo "bwrap: $(bwrap --version)"
          echo "prlimit: $(prlimit --version)"

      - name: Probe — unprivileged user namespaces (informational)
        # Informational only: the authoritative gate is the test step below (REQUIRE_SANDBOX=1 → the run fails
        # HARD if confinement is unavailable, surfacing as the headline assertion failing). This just surfaces
        # a clear "userns works/doesn't" signal early without ever failing the job on a bwrap-flag quirk —
        # turning an opaque "run was Failed" into a diagnosable cause.
        run: |
          if bwrap --ro-bind / / --dev /dev --proc /proc --unshare-all --uid 0 true; then
            echo "✓ unprivileged user namespaces work"
          else
            echo "⚠ userns probe failed — the REQUIRE_SANDBOX=1 test step is authoritative and will fail hard if confinement is truly unavailable"
          fi

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: /root/.nuget/packages
          key: nuget-e2e-engine-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-e2e-engine-

      - name: Restore
        run: dotnet restore backend/tests/CodeSpace.IntegrationTests/CodeSpace.IntegrationTests.csproj

      - name: Test (Category=E2E — the headline planner→map→real-agents→synthesizer flow)
        run: >
          dotnet test backend/tests/CodeSpace.IntegrationTests/CodeSpace.IntegrationTests.csproj
          --no-restore
          --filter "Category=E2E"
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=e2e-engine.trx"
          --results-directory backend/TestResults
          --blame-hang-timeout 5m

      - name: Assert the headline E2E actually ran (no silent skip)
        # `dotnet test --filter` EXITS 0 even when the filter matches ZERO tests, so a trait regression
        # could make this gate pass green while exercising nothing. Read the trx counters and require at
        # least the one headline-flow test to have executed (NOT skipped — the OS guard would skip it on a
        # non-Linux host, but this gate IS Linux, so a skip here means the real run was silently dodged).
        run: |
          trx=backend/TestResults/e2e-engine.trx
          test -f "$trx" || { echo "::error::trx not found at $trx — the test step produced no results"; exit 1; }
          executed=$(grep -oE 'executed="[0-9]+"' "$trx" | head -1 | grep -oE '[0-9]+')
          passed=$(grep -oE 'passed="[0-9]+"' "$trx" | head -1 | grep -oE '[0-9]+')
          echo "executed=${executed:-0} passed=${passed:-0}"
          if [ "${executed:-0}" -lt 1 ]; then
            echo "::error::Expected the Category=E2E headline-flow test to run, but ${executed:-0} executed — the filter matched nothing (trait regression?) or it was silently skipped."
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-engine-trx
          path: backend/TestResults/*.trx
          if-no-files-found: ignore
