# Local dev stack. Spins up the dependencies CodeSpace needs so `dotnet run` and
# `pnpm dev` work without any extra setup.
#
#   docker compose up -d            # start everything in the background
#   docker compose down             # stop containers, preserve data
#   docker compose down -v          # nuke the volume too (fresh DB)
#
# Credentials below intentionally match backend/src/CodeSpace.Api/appsettings.json —
# the API connects with codespace/codespace/codespace out of the box. Rotate via env
# vars in any non-local environment.

services:
  postgres:
    image: postgres:18-alpine
    container_name: codespace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codespace
      POSTGRES_PASSWORD: codespace
      POSTGRES_DB: codespace
      # Also create a postgres superuser so the integration test fixture
      # (TestPostgres:AdminConnectionString) can spin up disposable per-test DBs.
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      # PG18+ uses major-version-specific data layout; pin PGDATA to a subdirectory of the
      # mount so the volume-mount semantics we want (single named volume → all data) stay
      # intact while satisfying PG18's check that data isn't at /var/lib/postgresql/data
      # directly. See docker-library/postgres#37.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - codespace-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codespace -d codespace"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The CodeSpace app, split into TWO deployments off TWO images that mirror the production topology — the public
  # HTTP frontend and the local sandbox runner are different security/scaling concerns, so they are different
  # images (backend/Dockerfile.api + backend/Dockerfile.worker). Both run the SAME CodeSpace.Api.dll; the ROLE is
  # selected by CODESPACE_HANGFIRE_PROCESSING_ENABLED. Both are behind the "app" profile so the default local-dev
  # flow stays "compose up Postgres + `dotnet run`"; run the full containerised stack with
  # `docker compose --profile app up`. In k8s these become two Deployments that scale (replica) independently.

  # PUBLIC API — serves HTTP + enqueues, processes NO jobs (CODESPACE_HANGFIRE_PROCESSING_ENABLED=false → no
  # Hangfire server). It executes no agent and hosts no MCP endpoint, so it carries none of the agent-execution /
  # isolation deps (lean, internet-facing → small attack surface). Built from the minimal Dockerfile.api.
  api:
    profiles: ["app"]
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: codespace-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5099:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      CodeSpaceStore__ConnectionString: "Host=postgres;Port=5432;Database=codespace;Username=codespace;Password=codespace"
      # This pod NEVER processes jobs — it serves HTTP + enqueues only. Agent execution lives in the worker.
      CODESPACE_HANGFIRE_PROCESSING_ENABLED: "false"

  # WORKER = THE LOCAL SANDBOX RUNNER — the Hangfire PROCESSING pod (CODESPACE_HANGFIRE_PROCESSING_ENABLED unset →
  # default-ON). Agent runs + the per-run MCP endpoint execute HERE; the harness CLI is spawned as a confined child
  # by LocalProcessRunner. Built from Dockerfile.worker, which carries git + bubblewrap + util-linux (prlimit) +
  # the codespace-mcp proxy. The MCP endpoint + tool governance are turned ON here; code defaults stay fail-closed
  # default-OFF (a deployment that does not set these is byte-identical to today). Every flag is ${VAR:-default}.
  #
  # SAFETY: read-only tools are served UNCONDITIONALLY (McpRequestHandler short-circuits IsReadOnly BEFORE the
  # governance ledger); side-effecting tools route through the exactly-once ToolCallLedger + AgentToolGate matrix
  # (fail-closed). CONFINEMENT: bubblewrap is in the image, but CODESPACE_REQUIRE_SANDBOX is NOT armed here — running
  # bubblewrap inside an unprivileged container needs userns/privileged settings, so a prod k8s pod that grants
  # user namespaces arms CODESPACE_REQUIRE_SANDBOX=1 (fail-closed); local dev runs agents unconfined-in-container.
  worker:
    profiles: ["app"]
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: codespace-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5100:8080"   # the Hangfire dashboard (/hangfire) + internal HTTP; the PUBLIC surface is the api service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      CodeSpaceStore__ConnectionString: "Host=postgres;Port=5432;Database=codespace;Username=codespace;Password=codespace"
      # This pod IS the worker — leave Hangfire processing ON (default) so it executes agent runs + the MCP endpoint.
      CODESPACE_HANGFIRE_PROCESSING_ENABLED: "${CODESPACE_HANGFIRE_PROCESSING_ENABLED:-true}"
      # Open the per-run MCP endpoint for every agent run (the governed tool fabric the CLI harness reaches).
      CODESPACE_AGENT_MCP_ENDPOINT_ENABLED: "${CODESPACE_AGENT_MCP_ENDPOINT_ENABLED:-true}"
      # Route side-effecting tool calls through the exactly-once ledger + durable HITL approval (read-only tools
      # are unaffected). Default-ON here so the governance closed-loop actually runs.
      CODESPACE_AGENT_TOOL_GOVERNANCE_ENABLED: "${CODESPACE_AGENT_TOOL_GOVERNANCE_ENABLED:-true}"
      # The codespace-mcp proxy is published next to the API by the csproj target, so the default path resolves;
      # set this only to point at an air-gapped mirror or a custom location.
      CODESPACE_MCP_PROXY_PATH: "${CODESPACE_MCP_PROXY_PATH:-}"
      # Prod (userns-capable pod) arms the fail-closed isolation guard; left unset for local dev (see comment above).
      # CODESPACE_REQUIRE_SANDBOX: "1"

volumes:
  codespace-pgdata:
