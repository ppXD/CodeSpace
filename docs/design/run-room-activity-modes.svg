    <text class="ink muted txt" x="48" y="446">○ Review</text>
    <text class="red txt" x="48" y="478">△ Decisions · 1</text>

    <rect class="card" x="232" y="222" rx="12" ry="12" width="360" height="270"/>
    <rect class="soft" x="252" y="242" rx="10" ry="10" width="320" height="58"/>
    <text class="ink h2" x="270" y="266">Supervisor · round 2</text>
    <text class="ink muted small" x="270" y="286">next checkpoint after backend tests</text>
    <rect class="soft" x="252" y="320" rx="9" ry="9" width="320" height="48"/>
    <circle class="accent" cx="272" cy="344" r="5"/><text class="ink txt" x="288" y="349">backend-fix · retrying tests</text>
    <rect class="card" x="252" y="380" rx="9" ry="9" width="320" height="48"/>
    <circle class="amber" cx="272" cy="404" r="5"/><text class="ink txt" x="288" y="409">frontend-fix · waiting</text>
    <rect class="card" x="252" y="440" rx="9" ry="9" width="320" height="34"/>
    <circle class="subtle" cx="272" cy="457" r="5"/><text class="ink muted txt" x="288" y="462">correctness-review · pending</text>

    <rect class="decision" x="612" y="222" rx="12" ry="12" width="180" height="270"/>
    <text class="amber h2" x="632" y="252">Decision · 1</text>
    <text class="ink h2" x="632" y="288">Choose merge</text>
    <text class="ink h2" x="632" y="312">strategy</text>
    <text class="ink muted small" x="632" y="342">asked by backend-fix</text>
    <text class="ink muted small" x="632" y="365">recommends: squash</text>
    <rect class="soft" x="632" y="388" rx="8" ry="8" width="140" height="34"/>
    <text class="ink pillText" x="653" y="410">Use recommendation</text>
    <rect class="card" x="632" y="434" rx="8" ry="8" width="66" height="32"/>
    <text class="ink pillText" x="651" y="455">Choose</text>
    <rect class="card" x="706" y="434" rx="8" ry="8" width="66" height="32"/>
    <text class="ink pillText" x="718" y="455">Ask sup.</text>
  </g>

  <!-- PANEL 4 -->
