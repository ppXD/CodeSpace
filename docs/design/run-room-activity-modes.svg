    <text class="ink muted tiny" x="294" y="318">5 files · 44k tokens</text>
    <rect class="soft" x="258" y="340" rx="9" ry="9" width="312" height="58"/>
    <circle class="accent" cx="278" cy="369" r="5"/><text class="ink txt" x="294" y="374">frontend · patching UI</text>
    <text class="ink muted tiny" x="294" y="390">2 files · 31k tokens</text>
    <rect class="card" x="258" y="412" rx="9" ry="9" width="312" height="58"/>
    <circle class="green" cx="278" cy="441" r="5"/><text class="ink txt" x="294" y="446">docs · done</text>
    <text class="ink muted tiny" x="294" y="462">summary ready</text>

    <rect class="card" x="610" y="222" rx="12" ry="12" width="182" height="270"/>
    <text class="ink muted small" x="630" y="250">RIGHT RAIL</text>
    <text class="ink h2" x="630" y="285">Changes</text>
    <text class="ink muted small" x="630" y="312">Wisp · 7 files</text>
    <text class="ink muted small" x="630" y="334">SDK · read only</text>
    <text class="ink h2" x="630" y="378">Branches</text>
    <text class="ink muted small" x="630" y="405">run/backend</text>
    <text class="ink muted small" x="630" y="427">run/frontend</text>
  </g>

  <!-- PANEL 3 -->
