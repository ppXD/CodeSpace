    <text class="green txt" x="48" y="286">✓ Plan</text>
    <text class="accent txt" x="48" y="326">● Implement</text>
    <text class="ink muted small" x="68" y="354">backend-fix · retry</text>
    <text class="ink muted small" x="68" y="380">frontend-fix · wait</text>
