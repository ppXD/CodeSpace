    <g transform="translate(248,283)">
      <rect class="card" x="0" y="0" rx="8" width="72" height="44"/><text class="ink tiny" x="12" y="26">PR opened</text>
      <line class="greenLine" x1="72" y1="22" x2="112" y2="22"/>
